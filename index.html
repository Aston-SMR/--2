<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>百家樂輸入面板</title>
<style>
  body { font-family: Arial; text-align: center; }
  .container { width: 520px; margin: 20px auto; }
  .top-box { border: 2px solid #000; padding: 10px; display: flex; justify-content: space-between; }
  .side { width: 48%; }
  .title { font-weight: bold; margin-bottom: 10px; }

  /* 兩排版：上排2格，下排1格置中 */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 6px;
  }

  .cell {
    height: 60px; border: 1px solid #000;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer;
  }

  .span2 { grid-column: 1 / span 2; width: 100%; }

  .active { background-color: #ffd; }
  .buttons { margin-top: 20px; }
  button { margin: 5px; padding: 10px 15px; font-size: 16px; }
</style>
</head>
<body>
<div class="container">

  <div class="top-box">
    <!-- PLAYER -->
    <div class="side">
      <div class="title">PLAYER</div>
      <div class="grid">
        <div class="cell" data-index="0">P1</div>
        <div class="cell" data-index="1">P2</div>
        <div class="cell span2" data-index="4">P3</div>
      </div>
    </div>

    <!-- BANKER -->
    <div class="side">
      <div class="title">BANKER</div>
      <div class="grid">
        <div class="cell" data-index="2">B1</div>
        <div class="cell" data-index="3">B2</div>
        <div class="cell span2" data-index="5">B3</div>
      </div>
    </div>
  </div>

  <button onclick="clearBoard()">清除本局</button>

  <div class="buttons">
    <script>
      for(let i=0;i<=9;i++){
        document.write(`<button onclick="inputNumber(${i})">${i}</button>`);
      }
    </script>
  </div>

</div>

<script>
let values = ["","","","","",""];
let order = [0,1,2,3,4,5];
let currentStep = 0;
let selectedIndex = null;

const cells = document.querySelectorAll('.cell');

cells.forEach(cell => {
  cell.addEventListener('click', () => {
    selectedIndex = parseInt(cell.dataset.index);
    highlight();
  });
});

function inputNumber(num) {
  if(selectedIndex !== null) {
    values[selectedIndex] = num;
    selectedIndex = null;
  } else if(currentStep < 6) {
    let idx = order[currentStep];
    values[idx] = num;
    currentStep++;
  }
  render();
}

function render() {
  cells.forEach(cell => {
    let idx = parseInt(cell.dataset.index);
    cell.textContent = values[idx] || '';
  });
  highlight();
}

function highlight() {
  cells.forEach(cell => cell.classList.remove('active'));
  if(selectedIndex !== null) {
    document.querySelector(`.cell[data-index='${selectedIndex}']`).classList.add('active');
  }
}

function clearBoard() {
  values = ["","","","","",""];
  currentStep = 0;
  selectedIndex = null;
  render();
}
</script>

</body>
</html>
